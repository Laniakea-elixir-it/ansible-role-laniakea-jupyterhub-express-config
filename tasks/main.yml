---

- name: Create or update JupyterHub user and password
  import_task: jupyterhub_user.yml

- name: Restore export_dir
  import_tasks: restore_export.yml

- name: Start jupyterhub
  systemd:
    state: started
    enabled: yes
    name: "{{ service }}"
  become: yes

- name: Wait JupyterHub
  wait_for:
    host: 127.0.0.1
    port: "{{ port }}"
    timeout: 300
